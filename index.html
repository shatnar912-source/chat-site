<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>شات نار</title>

  <!-- خط عربي شائع -->
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;700&display=swap" rel="stylesheet">

  <!-- ملف الأنماط -->
  <link rel="stylesheet" href="style.css">

  <!-- أيقونات بسيطة (اختياري) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="" crossorigin="anonymous" />
</head>
<body>
  <div id="app" class="app-root">

    <!-- هيدر مركزي -->
    <header class="app-header">
      <!-- أيقونة القوائم اليسرى (في RTL تظهر على اليسار بصريًا) -->
      <div class="header-left">
        <button id="privateListBtn" class="icon-btn" aria-label="قائمة الرسائل الخاصة">
          <i class="fa-solid fa-message"></i>
        </button>
      </div>

      <!-- العنوان في المنتصف -->
      <div class="header-center">
        <h1 class="brand">شات نار</h1>
      </div>

      <!-- بروفايل على اليمين -->
      <div class="header-right">
        <div class="profile-dropdown">
          <button id="profileBtn" class="profile-btn" aria-haspopup="true" aria-expanded="false">
            <img src="assets/avatar-demo.png" alt="صورة الملف" class="avatar" />
          </button>

          <!-- قائمة البروفايل (تفتح فوق الهيدر بشكل أنيق) -->
          <div id="profileMenu" class="dropdown-menu dropdown-right" role="menu" aria-hidden="true">
            <div class="profile-card">
              <img src="assets/avatar-demo.png" alt="صورة الملف" class="avatar-lg" />
              <div class="profile-info">
                <div class="profile-name" id="profileName">مستخدم تجريبي</div>
                <div class="profile-bio" id="profileBio">نبذة قصيرة عن المستخدم</div>
              </div>
            </div>
            <hr />
            <ul class="profile-actions">
              <li><button class="menu-item" id="appSettingsBtn"><i class="fa-solid fa-gear"></i> إعداد التطبيق</button></li>
              <li><button class="menu-item" id="viewProfileBtn"><i class="fa-solid fa-eye"></i> عرض ملفك الآن</button></li>
              <li><button class="menu-item" id="logoutBtn"><i class="fa-solid fa-right-from-bracket"></i> تسجيل الخروج</button></li>
            </ul>
          </div>
        </div>
      </div>
    </header>

    <!-- قائمة الرسائل الخاصة صغيرة فوق الهيدر (dropdown) -->
    <div id="privateListDropdown" class="dropdown-menu dropdown-top dropdown-private" aria-hidden="true">
      <div class="dropdown-header">
        <strong>الرسائل الخاصة</strong>
      </div>
      <ul id="privateThreadsList" class="threads-list">
        <!-- عناصر المحادثات الخاصة ستُملأ ديناميكياً -->
        <!-- مثال عنصر -->
        <!--
        <li class="thread-item">
          <div class="thread-meta">
            <div class="thread-name">أحمد</div>
            <div class="thread-time">12:34</div>
          </div>
          <div class="thread-last">آخر رسالة قصيرة...</div>
          <div class="thread-unread">2</div>
        </li>
        -->
      </ul>
      <div class="dropdown-footer">
        <button id="openAllThreads" class="link-btn">عرض كل المحادثات</button>
      </div>
    </div>

    <!-- شريط البحث تحت الهيدر -->
    <div class="search-bar">
      <input id="userSearch" type="search" placeholder="ابحث عن مستخدم أو ابدأ محادثة..." aria-label="بحث عن مستخدم" />
      <button id="searchClear" class="icon-btn" aria-label="مسح البحث"><i class="fa-solid fa-xmark"></i></button>
    </div>

    <!-- المحتوى الرئيسي: عمودان -->
    <main class="main-grid">

      <!-- بلوك المستخدمين المتصلين الآن -->
      <aside class="panel users-panel" aria-label="المستخدمون المتصلون">
        <div class="panel-header">
          <h2>المتصلون الآن</h2>
          <span id="onlineCount" class="badge">0</span>
        </div>
        <ul id="onlineUsersList" class="users-list">
          <!-- عناصر المستخدمين المتصلين ستُملأ ديناميكياً -->
          <!-- مثال عنصر -->
          <!--
          <li class="user-item">
            <div class="user-avatar"><img src="assets/avatar-1.png" alt=""/></div>
            <div class="user-meta">
              <div class="user-name">سارة</div>
              <div class="user-status">متصل</div>
            </div>
          </li>
          -->
        </ul>
      </aside>

      <!-- بلوك الشات العام -->
      <section class="panel chat-panel" aria-label="الشات العام">
        <div class="chat-header">
          <h2>الشات العام</h2>
          <div class="chat-meta">مفتوح للجميع</div>
        </div>

        <ul id="publicMessages" class="messages-list" aria-live="polite">
          <!-- رسائل الشات العام ستُملأ ديناميكياً -->
          <!-- مثال رسالة -->
          <!--
          <li class="message message-other">
            <div class="msg-meta"><span class="msg-sender">أحمد</span> <span class="msg-time">12:30</span></div>
            <div class="msg-body">مرحبا بالجميع!</div>
            <div class="msg-status"><i class="fa-solid fa-check-double seen"></i></div>
          </li>
          -->
        </ul>

        <!-- نموذج إرسال رسالة -->
        <form id="publicMessageForm" class="message-form" autocomplete="off">
          <input id="publicMessageInput" type="text" placeholder="اكتب رسالة في الشات العام..." aria-label="اكتب رسالة" maxlength="2000" />
          <button type="submit" class="send-btn"><i class="fa-solid fa-paper-plane"></i> إرسال</button>
        </form>
      </section>

    </main>

    <!-- إشعار بسيط أسفل الصفحة (لأخطاء أو تأكيدات) -->
    <div id="toast" class="toast" aria-live="assertive" aria-atomic="true" hidden></div>

  </div>

  <!-- ربط ملفات الجافاسكربت -->
  <script type="module" src="firebase.js"></script>
  <script type="module" src="main.js"></script>
</body>
</html>
