<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>شات نار 🔥</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div id="app">

  <!-- 🔐 شاشة تسجيل الدخول -->
  <section id="authScreen" class="auth-screen">
    <div class="auth-card">
      <h1>شات نار 🔥</h1>

      <input id="authEmail" placeholder="الإيميل" />
      <input id="authPassword" type="password" placeholder="كلمة المرور" />

      <button id="loginBtn">تسجيل الدخول</button>
      <button id="registerBtn">إنشاء حساب</button>

      <p id="authMessage"></p>
    </div>
  </section>

  <!-- 🟢 الشاشة الرئيسية -->
  <section id="mainScreen" class="main-screen hidden">

    <!-- Topbar -->
    <div class="topbar">
      <button id="openRightPanelBtn">☰</button>

      <div>
        <strong>شات نار</strong>
      </div>

      <button id="openLeftPanelBtn" class="messages-icon">
        💬
        <span id="privateMessagesBadge" class="badge hidden">0</span>
      </button>
    </div>

    <!-- البحث -->
    <div class="search-wrap">
      <input id="globalSearchInput" placeholder="ابحث عن مستخدم..." />
    </div>

    <div class="content-grid">

      <!-- يمين -->
      <aside id="rightPanel" class="side-panel right-panel">
        <button id="closeRightPanelBtn">✖</button>

        <div>
          <div id="profileAvatar">👤</div>
          <h3 id="profileName"></h3>
          <p id="profileUsername"></p>
        </div>

        <button id="visitedProfileBtn">
          زار ملفك
          <span id="visitedBadge" class="badge hidden">0</span>
        </button>

        <button id="settingsBtn">⚙️ الإعدادات</button>
        <button id="logoutBtn">🚪 تسجيل الخروج</button>

        <!-- 🔥 للادمن فقط -->
        <div id="adminFilesPanel" class="hidden">
          <h4>حالة الملفات</h4>
          <div>index: <span id="statusIndex"></span></div>
          <div>main: <span id="statusMain"></span></div>
          <div>firebase: <span id="statusFirebase"></span></div>
          <div>style: <span id="statusStyle"></span></div>
        </div>
      </aside>

      <!-- الشات -->
      <main class="main-panel">

        <div class="chat-card">
          <div id="publicMessages" class="messages-list"></div>

          <form id="publicMessageForm">
            <input id="publicMessageInput" placeholder="اكتب رسالة..." />
            <button>إرسال</button>
          </form>
        </div>

      </main>

      <!-- شمال -->
      <aside id="leftPanel" class="side-panel left-panel">
        <button id="closeLeftPanelBtn">✖</button>

        <h3>المحادثات</h3>
        <input id="privateSearchInput" placeholder="بحث..." />
        <div id="privateChatsList"></div>

        <h3>أونلاين</h3>
        <div id="onlineUsersList"></div>

        <h3>مميزين</h3>
        <div id="featuredUsersList"></div>
      </aside>

    </div>
  </section>

  <!-- 👤 البروفايل -->
  <section id="profileScreen" class="profile-screen hidden">
    <button id="backToMainBtn">⬅ رجوع</button>

    <div id="profilePageAvatar"></div>
    <h2 id="profilePageName"></h2>
    <p id="profilePageUsername"></p>

    <p>الاسم: <span id="infoName"></span></p>
    <p>السن: <span id="infoAge"></span></p>
    <p>الجنسية: <span id="infoNationality"></span></p>
    <p>النوع: <span id="infoGender"></span></p>
    <p>نبذة: <span id="infoBio"></span></p>

    <button id="editProfileBtn">تعديل</button>

    <div id="editProfilePanel" class="hidden">
      <input id="editName" placeholder="الاسم" />
      <input id="editAge" placeholder="السن" />
      <input id="editNationality" placeholder="الجنسية" />
      <input id="editGender" placeholder="النوع" />
      <textarea id="editBio"></textarea>
      <button id="saveProfileBtn">حفظ</button>
    </div>

    <button id="messageFromProfileBtn">💬 رسالة</button>
  </section>

  <!-- 💬 شات خاص -->
  <section id="privateChatScreen" class="private-chat-screen hidden">
    <button id="backFromPrivateChatBtn">⬅ رجوع</button>

    <h3 id="privateChatTitle"></h3>
    <p id="privateChatSubtitle"></p>

    <div id="privateMessages"></div>

    <form id="privateMessageForm">
      <input id="privateMessageInput" placeholder="اكتب..." />
      <button>إرسال</button>
    </form>
  </section>

</div>

<script type="module" src="main.js"></script>

</body>
</html>
