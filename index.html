<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>K3-Z</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app" class="app-shell">

    <!-- الهيدر -->
    <header class="app-header" id="appHeader">
      <div class="header-side header-left">
        <button id="messagesBtn" class="icon-btn" aria-label="الرسائل">
          ☰
        </button>
      </div>

      <div class="header-title">
        <h1>K3-Z</h1>
      </div>

      <div class="header-side header-right">
        <button id="menuBtn" class="icon-btn" aria-label="القائمة">
          ☰
        </button>
      </div>
    </header>

    <!-- شريط البحث تحت الهيدر مباشرة -->
    <section class="search-row" id="searchRow">
      <input
        type="search"
        id="searchInput"
        class="search-input"
        placeholder="ابحث هنا..."
        autocomplete="off"
      />
    </section>

    <!-- المحتوى الرئيسي -->
    <main class="app-main" id="appMain">

      <!-- المتصلين الآن -->
      <section class="panel panel-online" id="onlinePanel">
        <div class="panel-header">
          <h2>المتصلون الآن</h2>
        </div>
        <div class="panel-body" id="onlineUsersList">
          <!-- items -->
        </div>
      </section>

      <!-- المستخدمين المميزين -->
      <section class="panel panel-featured" id="featuredPanel">
        <div class="panel-header">
          <h2>المستخدمون المميزون</h2>
        </div>
        <div class="panel-body" id="featuredUsersList">
          <!-- items -->
        </div>
      </section>

      <!-- الشات العام -->
      <section class="panel panel-chat" id="publicChatPanel">
        <div class="panel-header">
          <h2>الشات العام</h2>
        </div>

        <div class="chat-messages" id="chatMessages">
          <!-- messages -->
        </div>

        <div class="chat-composer">
          <input
            type="text"
            id="messageInput"
            class="message-input"
            placeholder="اكتب رسالة..."
            autocomplete="off"
          />
          <button id="sendBtn" class="send-btn">إرسال</button>
        </div>
      </section>
    </main>

    <!-- القائمة اليمين -->
    <aside class="right-drawer" id="rightDrawer" aria-hidden="true">
      <div class="drawer-profile" id="drawerProfile">
        <div class="profile-avatar" id="profileAvatar">K</div>
        <div class="profile-meta">
          <div class="profile-name" id="profileName">K3-Z User</div>
          <div class="profile-sub" id="profileSub">الملف الشخصي</div>
        </div>

        <div class="profile-badge-wrap">
          <span class="profile-badge" id="profileBadge">0</span>
        </div>
      </div>

      <nav class="drawer-menu" id="drawerMenu">
        <button class="drawer-item" id="visitedMeBtn">
          <span>من زار ملفك</span>
        </button>

        <button class="drawer-item" id="appSettingsBtn">
          <span>إعدادات التطبيق</span>
        </button>

        <button class="drawer-item" id="logoutBtn">
          <span>تسجيل الخروج</span>
        </button>
      </nav>
    </aside>

    <!-- طبقة إغلاق القائمة -->
    <div class="drawer-overlay" id="drawerOverlay"></div>
  </div>

  <!-- الترتيب مهم جدًا -->
  <script src="stateManager.js" defer></script>
  <script src="k3-event-system.js" defer></script>
  <script src="firebase.js" defer></script>
  <script src="main.js" defer></script>
</body>
</html>
